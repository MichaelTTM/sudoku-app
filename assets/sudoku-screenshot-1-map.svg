art">霓虹下城</text><text x="96" y="786" font-family="PingFang TC, Noto Sans CJK TC, sans-serif" font-size="28" font-weight="400" fill="#9a9aa6" text-anchor="start">雨夜、霓虹與第一具失蹤者的線索。</text><circle cx="200" cy="900" r="54" fill="#ec4899"/><polygon points="200.0,878.0 205.4,892.5 220.9,893.2 208.8,902.9 212.9,917.8 200.0,909.2 187.1,917.8 191.2,902.9 179.1,893.2 194.6,892.5" fill="#ffffff"/><polygon points="170.0,965.0 173.2,973.6 182.4,974.0 175.2,979.7 177.6,988.5 170.0,983.5 162.4,988.5 164.8,979.7 157.6,974.0 166.8,973.6" fill="#fbbf24"/><polygon points="200.0,965.0 203.2,973.6 212.4,974.0 205.2,979.7 207.6,988.5 200.0,983.5 192.4,988.5 194.8,979.7 187.6,974.0 196.8,973.6" fill="#fbbf24"/><polygon points="230.0,965.0 233.2,973.6 242.4,974.0 235.2,979.7 237.6,988.5 230.0,983.5 222.4,988.5 224.8,979.7 217.6,974.0 226.8,973.6" fill="#fbbf24"/><circle cx="880" cy="1030" r="54" fill="#ec4899"/><polygon points="880.0,1008.0 885.4,1022.5 900.9,1023.2 888.8,1032.9 892.9,1047.8 880.0,1039.2 867.1,1047.8 871.2,1032.9 859.1,1023.2 874.6,1022.5" fill="#ffffff"/><polygon points="850.0,1095.0 853.2,1103.6 862.4,1104.0 855.2,1109.7 857.6,1118.5 850.0,1113.5 842.4,1118.5 844.8,1109.7 837.6,1104.0 846.8,1103.6" fill="#fbbf24"/><polygon points="880.0,1095.0 883.2,1103.6 892.4,1104.0 885.2,1109.7 887.6,1118.5 880.0,1113.5 872.4,1118.5 874.8,1109.7 867.6,1104.0 876.8,1103.6" fill="#fbbf24"/><polygon points="910.0,1095.0 913.2,1103.6 922.4,1104.0 915.2,1109.7 917.6,1118.5 910.0,1113.5 902.4,1118.5 904.8,1109.7 897.6,1104.0 906.8,1103.6" fill="#fbbf24"/><circle cx="200" cy="1160" r="54" fill="#ec4899"/><polygon points="200.0,1138.0 205.4,1152.5 220.9,1153.2 208.8,1162.9 212.9,1177.8 200.0,1169.2 187.1,1177.8 191.2,1162.9 179.1,1153.2 194.6,1152.5" fill="#ffffff"/><polygon points="170.0,1225.0 173.2,1233.6 182.4,1234.0 175.2,1239.7 177.6,1248.5 170.0,1243.5 162.4,1248.5 164.8,1239.7 157.6,1234.0 166.8,1233.6" fill="#fbbf24"/><polygon points="200.0,1225.0 203.2,1233.6 212.4,1234.0 205.2,1239.